#Clash.Meta(mihomo)
ishu: &ishu
    interval: 43200
    health-check:
        enable: true
        url: 'https://www.gstatic.com/generate_204'
        interval: 300
        timeout: 5000
        lazy: true
        expected-status: 204


# Proxy Providers
proxy-providers:
  机场1:
    url: "在此填入第1个机场的订阅链接(Clash/mihomo 格式)"
    type: http
    <<: *ishu
    path: './proxy_provider/providers_1.yaml'
    proxy: Proxies
    override:
      additional-prefix: "机场标识"
    filter: '^(?!.*(?i)(?:NEVER_MATCH)).*$'

  机场2:
    url: "在此填入第2个机场的订阅链接(Clash/mihomo 格式)"
    type: http
    <<: *ishu
    path: './proxy_provider/providers_2.yaml'
    proxy: Proxies
    override:
      additional-prefix: "机场标识"
    filter: '^(?!.*(?i)(?:NEVER_MATCH)).*$'
    
  LandNode:
    type: file
    <<: *ishu
    override:
      additional-prefix: "🔗"
      dialer-proxy: 中转
    path: './proxy_provider/LandNode.yaml'

  OtherNode:
    type: file
    <<: *ishu
    path: './proxy_provider/OtherNode.yaml'

# Global Configuration
mixed-port: 7890
socks-port: 0
port: 0
redir-port: 0
tproxy-port: 0
mode: rule
log-level: info
ipv6: false
find-process-mode: always
authentication: []
skip-auth-prefixes:
  - 127.0.0.1/32
  - ::1/128

allow-lan: true
lan-disallowed-ips: []
bind-address: "*"
lan-allowed-ips:
  - 0.0.0.0/0
  - ::/0

### External Controller
external-controller: 0.0.0.0:7891
external-ui: ui
secret: ""
external-ui-url: 'https://github.com/Zephyruso/zashboard/releases/latest/download/dist.zip'
external-controller-cors:
  allow-origins:
    - "*"
  allow-private-network: true

profile:
  store-selected: true
  store-fake-ip: true

unified-delay: true
tcp-concurrent: true
global-client-fingerprint: chrome

geodata-mode: true
geo-auto-update: false
geo-update-interval: 24
geox-url:
  geoip: 'https://github.com/Loyalsoldier/v2ray-rules-dat/releases/latest/download/geoip.dat'
  geosite: 'https://github.com/Loyalsoldier/v2ray-rules-dat/releases/latest/download/geosite.dat'
  mmdb: 'https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/country-lite.mmdb'
  asn: 'https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/GeoLite2-ASN.mmdb'

# Tunnel Configuration
tun:
  enable: true
  device: mihomo
  stack: system
  dns-hijack:
    - "any:53"
  auto-route: true
  auto-detect-interface: true
  mtu: 1500
  inet6-address:
    - "fdfe:dcba:9876::1/126"
  auto-redirect: true
  strict-route: true
  endpoint-independent-nat: true
  udp-timeout: 300


# DNS Configuration
dns:
  enable: true
  listen: "0.0.0.0:1053"
  prefer-h3: false
  use-system-hosts: true
  ipv6: false
  cache-algorithm: arc
  respect-rules: true
  enhanced-mode: "fake-ip"
  fake-ip-range: "198.18.0.1/16"
  fake-ip-filter:
    - "*.lan"
    - "+.local"
    - "localhost.ptlogin2.qq.com"
    - "geosite:private"
  default-nameserver:
    - "223.5.5.5"
    - "119.29.29.29"
  nameserver:
    - "https://cloudflare-dns.com/dns-query"
    - "https://dns.google/dns-query"
  proxy-server-nameserver:
    - "https://doh.pub/dns-query"
    - "https://dns.alidns.com/dns-query"
  nameserver-policy:
    "geosite:cn,private":
      - "https://doh.pub/dns-query"
      - "https://dns.alidns.com/dns-query"
    "+.internal.crop.com": "10.0.0.1"
# Sniffer Configuration
sniffer:
  enable: true
  parse-pure-ip: true
  sniff:
    tls:
      ports: [443, 8443]
    http:
      ports: [80, 8080-8888]
      priority: 1
    quic:
      ports: [443, 8443]
  force-domain:
    - "+"
  skip-domain:
    - "Mijia Cloud"
    - "dlg.io.mi.com"
    - "+.apple.com"


# Node Filters
FilterHK: &FilterHK 
  '^(?=.*((?i)(香港|🇭🇰)))(?!.*((?i)(🔗|实验))).*$'

FilterJP: &FilterJP 
  '^(?=.*((?i)(日本|🇯🇵)))(?!.*((?i)(🔗|实验))).*$'

FilterKR: &FilterKR 
  '^(?=.*((?i)(韩国|🇰🇷)))(?!.*((?i)(🔗|实验))).*$'

FilterSG: &FilterSG 
  '^(?=.*((?i)(新加坡|🇸🇬)))(?!.*((?i)(🔗|实验))).*$'

FilterUS: &FilterUS 
  '^(?=.*((?i)(美国|🇺🇸)))(?!.*((?i)(🔗|实验))).*$'

FilterUK: &FilterUK 
  '^(?=.*((?i)(英国|🇬🇧)))(?!.*((?i)(🔗|实验))).*$'

FilterAU: &FilterAU 
  '^(?=.*((?i)(澳大利亚|🇦🇺)))(?!.*((?i)(🔗|实验))).*$'

FilterFR: &FilterFR 
  '^(?=.*((?i)(法国|🇫🇷)))(?!.*((?i)(🔗|实验))).*$'

FilterDE: &FilterDE 
  '^(?=.*((?i)(德国|🇩🇪)))(?!.*((?i)(🔗|实验))).*$'

FilterTW: &FilterTW 
  '^(?=.*((?i)(台湾|🇹🇼)))(?!.*((?i)(🔗|实验))).*$'

FilterOthers: &FilterOthers 
  '^(?!.*((?i)(香港|🇭🇰|台湾|🇹🇼|日本|🇯🇵|新加坡|🇸🇬|美国|🇺🇸|德国|🇩🇪|英国|🇬🇧|韩国|🇰🇷|法国|🇫🇷|澳大利亚|🇦🇺)))(?!.*((?i)(🔗|实验))).*$'

FilterExperiment: &FilterExperiment 
  '^(?=.*((?i)(实验)))(?!.*((?i)(🔗))).*$'

FilterAll: &FilterAll 
  '^(?!.*((?i)(🔗|实验))).*$'

# Proxy Group Templates
Select: &Select
  type: select
  disable-udp: false
  hidden: false
  include-all: true

Auto: &Auto
  type: url-test
  url: 'https://www.gstatic.com/generate_204'
  expected-status: 204
  interval: 300
  timeout: 5000
  lazy: true
  tolerance: 50
  disable-udp: false
  hidden: false
  include-all: true

FallBack: &FallBack
  type: fallback
  url: 'https://www.gstatic.com/generate_204'
  expected-status: 204
  interval: 300
  timeout: 5000
  lazy: true
  disable-udp: false
  hidden: false
  include-all: true

Select_Proxies: &Select_Proxies
  type: select
  disable-udp: false
  hidden: false
  include-all: true
  proxies: [Proxies, 🧪实验低倍率, 🔗链式代理, DIRECT, ⛔阻断, 
            🟨手动选择, 🟦手动选择, 
            🟢故障转移, 🟣故障转移, 
            🔶自动选择, 🔷自动选择, 
            🇭🇰手动选择, 🇸🇬手动选择, 
            🇺🇸手动选择, 🇹🇼手动选择,
            🇯🇵手动选择, 🇰🇷手动选择, 
            🇦🇺手动选择, 🇬🇧手动选择, 
            🇫🇷手动选择, 🇩🇪手动选择, 
            🇭🇰自动选择, 🇸🇬自动选择, 
            🇺🇸自动选择, 🇹🇼自动选择, 
            🇯🇵自动选择, 🇰🇷自动选择, 
            🇦🇺自动选择, 🇬🇧自动选择, 
            🇫🇷自动选择, 🇩🇪自动选择, 
            🇭🇰故障转移, 🇸🇬故障转移, 
            🇺🇸故障转移, 🇹🇼故障转移, 
            🇯🇵故障转移, 🇰🇷故障转移, 
            🇦🇺故障转移, 🇬🇧故障转移, 
            🇫🇷故障转移, 🇩🇪故障转移, 
            ↩️绕过]

