# Rule Providers
rule-providers:
  # LAN
  lan:
    type: http
    behavior: classical
    interval: 43200
    proxy: Proxies
    url: 'https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/refs/heads/master/rule/Clash/Lan/Lan.yaml'
    path: './rule_set/lan.yaml'

  # ChinaDIRECT
  cnsite:
    type: http
    behavior: domain
    format: mrs
    interval: 43200
    proxy: Proxies
    url: 'https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/cn.mrs'
    path: './rule_set/cnsite.mrs'

  cnip:
    type: http
    behavior: ipcidr
    format: mrs
    interval: 43200
    proxy: Proxies
    url: 'https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geoip/cn.mrs'
    path: './rule_set/cnip.mrs'
  
  # Other
  gemini:
    type: http
    behavior: classical
    interval: 43200
    proxy: Proxies
    url: 'https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/refs/heads/master/rule/Clash/Gemini/Gemini.yaml'
    path: './rule_set/gemini.yaml'
    
  googlefcm:
    type: http
    behavior: classical
