global-ua: "Mozilla/5.0 (Linux; Android 13) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0 Mobile Safari/537.36"
profile: {store-selected: true, store-fake-ip: true}
ntp: {enable: true, server: time.apple.com, port: 123, interval: 30, dialer-proxy: "", write-to-system: false}
experimental: {quic-go-disable-ecn: true}

external-controller-cors:
  allow-origins: ["*"]
  allow-private-network: true
external-controller: 127.0.0.1:9092
secret: "88888888"
external-ui: './ui'
external-ui-name: zashboard
external-ui-url: "https://codeload.github.com/Zephyruso/zashboard/zip/refs/heads/gh-pages"

tun:
  enable: true
  device: mihomo
  stack: mixed
  mtu: 1500
  inet6-address: [fdfe:dcba:9876::1/126]
  strict-route: true
  dns-hijack: ["any:53", "tcp://any:53"]
  auto-route: true
  auto-redirect: true
  auto-detect-interface: true
  gso: true
  gso-max-size: 65536
  endpoint-independent-nat: true
  udp-timeout: 60
  disable-icmp-forwarding: true
  route-exclude-address-set: [private-ip]
