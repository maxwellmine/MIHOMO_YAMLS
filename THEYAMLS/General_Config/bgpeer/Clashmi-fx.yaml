port: 7896
socks-port: 7891
redir-port: 7892
tproxy-port: 7894
mixed-port: 7893  
mode: rule
log-level: warning
ipv6: true
etag-support: true
disable-keep-alive: false
find-process-mode: always
global-client-fingerprint: chrome
unified-delay: true
tcp-concurrent: true
inbound-tfo: true
inbound-mptcp: false
allow-lan: true
keep-alive-idle: 300
keep-alive-interval: 30
bind-address: "*"
authentication: ["meta:88888888"]
skip-auth-prefixes: ["127.0.0.1/8", "::1/128"]
lan-allowed-ips: ["0.0.0.0/0", "::/0"]
